[API]
# API provider: openai, ollama, or llamacpp
provider = llamacpp

# OpenAI settings
openai_api_key = your_api_key_here
openai_model = gpt-4o
openai_base_url = https://api.openai.com/v1

# Ollama settings
ollama_base_url = http://localhost:11434/v1
ollama_model = llava

# LlamaCpp settings
llamacpp_base_url = http://localhost:8080/v1
llamacpp_model = glm46v

[Canvas]
width = 800
height = 600

[LLM]
max_tokens = 2000
prompt = Convert the handwritten text and mathematical formulas in this image to LaTeX. Only output the LaTeX code without any explanation or thinking.

[Shortcuts]
# Keyboard shortcuts for tools and actions
# Format: GTK accelerator format (e.g., <Control>c, <Alt>e, <Shift><Control>s)
tool_pen = <Control>c
tool_eraser = <Control>e
clear_canvas = <Control>d
submit = <Control>s
