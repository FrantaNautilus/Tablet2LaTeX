[API]
# API provider: openai, ollama, or llamacpp
# Uncomment and configure the provider you want to use

provider = openai

# ===== OpenAI Configuration =====
# Get your API key from https://platform.openai.com/api-keys
openai_api_key = your_api_key_here
openai_model = gpt-4o
openai_base_url = https://api.openai.com/v1

# ===== Ollama Configuration =====
# Make sure Ollama is running with: ollama serve
# Pull a vision model with: ollama pull llava
ollama_base_url = http://localhost:11434/v1
ollama_model = llava

# ===== LlamaCpp Configuration =====
# Start llama.cpp server with a vision-capable model
llamacpp_base_url = http://localhost:8080/v1
llamacpp_model = llava

[Canvas]
# Canvas dimensions in pixels
width = 800
height = 600

[LLM]
# Maximum tokens for LLM response
max_tokens = 1000
